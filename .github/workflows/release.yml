name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Attach the macOS build to this existing release tag"
        required: false

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build installers (Linux)
        if: matrix.os == 'ubuntu-22.04' && github.event_name == 'push'
        run: frontend/node_modules/.bin/tauri build --bundles deb,rpm

      - name: Build installers (Windows)
        if: matrix.os == 'windows-latest' && github.event_name == 'push'
        run: frontend/node_modules/.bin/tauri build --bundles nsis,msi

      - name: Build installers (macOS)
        if: matrix.os == 'macos-latest'
        run: frontend/node_modules/.bin/tauri build --bundles dmg

      - name: Publish to the release
        if: github.event_name == 'push' || matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: |
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
            target/release/bundle/dmg/*.dmg
          generate_release_notes: ${{ github.event_name == 'push' }}
          fail_on_unmatched_files: false
